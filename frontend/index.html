<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KareDefteri - Anlarınızı Karelerle Paylaşın</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Navbar -->
        <nav class="navbar" id="navbar" style="display:none">
            <a class="navbar-brand" href="#" onclick="navigate('feed')">
                <span>📷</span> KareDefteri
            </a>

            <div class="nav-search-wrapper">
                <div class="nav-search">
                    <input type="text" id="search-input" placeholder="Kullanıcı ara..." oninput="handleSearch(this)" autocomplete="off">
                </div>
                <div id="search-dropdown" class="search-dropdown" style="display:none"></div>
            </div>

            <div class="navbar-nav">
                <button class="nav-btn" onclick="navigate('feed')" title="Ana Sayfa">
                    <span class="icon">🏠</span>
                </button>
                <button class="nav-btn" onclick="navigate('profile', {userId: currentUser?.id})" title="Profilim">
                    <span class="icon">👤</span> <span id="nav-username"></span>
                </button>
                <button class="nav-btn" id="nav-admin-btn" onclick="navigate('admin')" title="Admin Panel" style="display:none">
                    <span class="icon">⚙️</span>
                </button>
                <button class="nav-btn" onclick="logout()" title="Çıkış">
                    <span class="icon">🚪</span>
                </button>
            </div>
        </nav>

        <!-- Pages -->
        <div class="main-content">
            <div id="page-login" class="page"></div>
            <div id="page-register" class="page"></div>
            <div id="page-verify" class="page"></div>
            <div id="page-feed" class="page"></div>
            <div id="page-profile" class="page"></div>
            <div id="page-followers" class="page"></div>
            <div id="page-admin" class="page"></div>
        </div>

        <!-- Modal Container -->
        <div id="modal-container"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
